version: '3'

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/devang-travels
      ADMIN_PASSWORD: admin123
    ports:
      - "5000:5000"
    container_name: backend
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    container_name: frontend

volumes:
  mongodb_data:
